<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUTR SAMS - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body,
        html {
            height: 100%;
            margin: 0;
        }

        .login-bg {
            background-image: url('https://outr.ac.in/public/uploads/QT-odisha_1.png');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* softer overlay */
        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
        }

        .login-box {
            position: relative;
            z-index: 2;
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .login-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .login-body {
            padding: 25px 25px 30px;
        }

        /* cleaner tabs */
        .nav-tabs {
            border-bottom: none;
            justify-content: center;
        }

        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 500;
        }

        .nav-tabs .nav-link.active {
            color: #0d6efd;
            border-bottom: 2px solid #0d6efd;
            background: transparent;
        }

        /* inputs smaller + cleaner */
        .form-control {
            padding: 10px 12px;
            font-size: 0.95rem;
        }

        .btn-primary {
            padding: 10px;
            font-weight: 600;
        }

        @media (max-width: 576px) {
            .login-body {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="login-bg">
        <div class="login-box">

            <!-- Header -->
            <div class="login-header">
                <h5 class="fw-bold mb-1">OUTR - SAMS</h5>
            </div>

            <!-- Body -->
            <div class="login-body">

                <!-- Tabs -->
                <ul class="nav nav-tabs mb-4" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#student">
                            Student / Faculty
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#admin">
                            Admin
                        </button>
                    </li>
                </ul>

                <div class="tab-content">

                    <!-- Student / Faculty -->
                    <div class="tab-pane fade show active" id="student">
                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-3">
                                <input type="text" name="username" class="form-control" placeholder="Username" required
                                    autofocus>
                            </div>

                            <div class="mb-3">
                                <input type="password" name="password" class="form-control" placeholder="Password"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Login
                            </button>
                        </form>
                    </div>

                    <!-- Admin -->
                    <div class="tab-pane fade" id="admin">
                        <div class="text-center py-4">
                            <p class="text-muted small mb-3">Administrator access</p>
                            <a href="/admin/login/" class="btn btn-outline-danger w-100">
                                Go to Admin
                            </a>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
