{% extends 'base.html' %}

{% block title %}OUTR SAMS - Home{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 800px;">

    <div class="text-center">

        <!-- Title -->
        <h1 class="fw-bold mb-3">
            OUTR Student Attendance Management System
        </h1>

        <!-- Subtitle -->
        <p class="text-muted mb-4">
            Simple and reliable student attendance management
        </p>

        {% if message %}
        <div class="alert alert-info small">
            {{ message }}
        </div>
        {% endif %}

        <!-- CTA -->
        <div class="mt-4">
            <a href="{% url 'login' %}" class="btn btn-primary px-4">
                Login
            </a>
        </div>

    </div>

</div>
{% endblock %}
