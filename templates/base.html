<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OUTR - SAMS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 70px;
            padding-bottom: 50px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg border-bottom fixed-top bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">

            <!-- Left -->
            <span class="navbar-brand">OUTR-SAMS</span>

            <!-- Right buttons -->
            <div class="d-flex align-items-center ms-auto gap-2">
                {% if user.is_authenticated %}
                <!-- Logout -->
                <form action="{% url 'logout' %}" method="post" class="mb-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm text-danger border-0">
                        <i class="fa-solid fa-right-from-bracket fs-5"></i>
                    </button>
                </form>
                {% endif %}

            </div>

        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}

    <footer class="fixed-bottom">
        <div class="container py-2">
            <span class="small">&copy; OUTR 2026</span>
        </div>
    </footer>
</body>

</html>
